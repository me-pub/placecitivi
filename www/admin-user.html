<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Admin - User</title>
    <link rel="stylesheet" href="cctv-admin.css">
</head>
<body>
<header>
    <div class="title">
        <strong>CCTV Admin</strong>
        <span class="muted" id="whoami"></span>
    </div>
    <nav>
        <a href="admin-cameras.html">Cameras</a>
        <a href="admin-settings.html">Settings</a>
        <a href="admin-user.html">User</a>
        <a href="admin-backup.html">Backup</a>
        <a href="index.html">Map</a>
        <a href="streams.html">Streams</a>
        <button id="logoutBtn" class="danger" type="button">Logout</button>
    </nav>
</header>

<div class="login-wrap">
    <div class="card">
        <h2>Admin Account</h2>
        <div class="muted">Change username and/or password for the admin account.</div>

        <label>New Username (optional)</label>
        <input id="newUser" autocomplete="username">

        <label>New Password (optional)</label>
        <input id="newPass" type="password" autocomplete="new-password">

        <div class="btnrow">
            <button id="saveUser" type="button">Update Account</button>
        </div>

        <div class="status" id="userStatus"></div>
    </div>
    <div class="muted" style="margin-top:10px">
        Note: this app uses cookie-based login; after changing credentials you will be logged out.
    </div>
</div>

<script src="cctv-admin-common.js"></script>
<script src="cctv-admin-user.js"></script>
</body>
</html>
