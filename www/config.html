<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>config - go2rtc</title>
    <link rel="stylesheet" href="cctv-theme.css">
    <script src="https://unpkg.com/ace-builds@1.33.1/src-min/ace.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .editor-card {
            flex: 1 1 auto;
            min-height: 0;
            padding: 16px;
        }

        #config {
            height: 100%;
            min-height: 64vh;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: rgba(255, 250, 244, 0.82);
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body>

<script src="main.js"></script>

<main>
    <section class="card">
        <div class="toolbar">
            <button id="save" class="primary" type="button">Save & Restart</button>
        </div>
    </section>
    <section class="surface editor-card">
        <div id="config" aria-label="Configuration editor"></div>
    </section>
</main>

<script>
    /* global ace */
    ace.config.set('basePath', 'https://unpkg.com/ace-builds@1.33.1/src-min/');
    const editor = ace.edit('config', {
        mode: 'ace/mode/yaml',
    });

    let dump;

    document.getElementById('save').addEventListener('click', async () => {
        let r = await fetch('api/config', {cache: 'no-cache'});
        if (r.ok && dump !== await r.text()) {
            alert('Config was changed from another place. Refresh the page and make changes again');
            return;
        }

        r = await fetch('api/config', {method: 'POST', body: editor.getValue()});
        if (r.ok) {
            alert('OK');
            dump = editor.getValue();
            await fetch('api/restart', {method: 'POST'});
        } else {
            alert(await r.text());
        }
    });

    window.addEventListener('load', async () => {
        const r = await fetch('api/config', {cache: 'no-cache'});
        if (r.status === 410) {
            alert('Config file is not set');
        } else if (r.status === 404) {
            editor.setValue('');
        } else if (r.ok) {
            dump = await r.text();
            editor.setValue(dump);
        } else {
            alert(`Unknown error: ${r.statusText} (${r.status})`);
        }
    });
</script>

</body>
</html>
