<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-height: 64px;
            --bg: #0b0d10;
            --bg-2: #121620;
            --ink: #f7f3ea;
            --muted: #a6a19a;
            --card: rgba(20, 24, 32, 0.88);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffbf5f;
            --grid-cols: 1;
            --grid-rows: 1;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: radial-gradient(circle at 15% 15%, #1b2230, var(--bg));
            color: var(--ink);
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(120deg, #111823, #0c1016 55%, #0b0d10);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand img {
            height: 34px;
            width: auto;
            display: none;
            border-radius: 8px;
        }

        .brand-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-title strong {
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .brand-title span {
            font-family: "Space Mono", monospace;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--ink);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border: 1px solid transparent;
            padding: 6px 10px;
            border-radius: 999px;
            transition: all 0.2s ease;
        }

        nav a:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        nav a.active {
            background: rgba(255, 191, 95, 0.16);
            border-color: rgba(255, 191, 95, 0.4);
            color: #ffdb9a;
        }

        main {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 16px 16px 20px;
            gap: 12px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted);
        }

        .status-pill strong {
            color: var(--ink);
        }

        #grid {
            flex: 1;
            min-height: 0;
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(var(--grid-cols), minmax(0, 1fr));
            grid-template-rows: repeat(var(--grid-rows), minmax(0, 1fr));
        }

        .tile {
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
        }

        .tile-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            gap: 10px;
        }

        .tile-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .tile-title strong {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tile-title span {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tile-badge {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--muted);
        }

        .tile-media {
            position: relative;
            flex: 1;
            min-height: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile-media video-stream {
            width: 100%;
            height: 100%;
            display: block;
        }

        .tile-media .placeholder {
            color: var(--muted);
            font-size: 13px;
        }

        .grid-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) {
            header {
                height: auto;
                padding: 12px 14px;
                gap: 10px;
                flex-direction: column;
                align-items: flex-start;
            }

            nav {
                width: 100%;
                justify-content: flex-start;
            }

            main {
                padding: 12px;
            }

            .tile-top {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<script type="module" src="./video-stream.js"></script>

<header>
    <div class="brand">
        <img id="corpLogo" alt="logo">
        <div class="brand-title">
            <strong id="corpName">GRID</strong>
            <span id="corpTag">CCTV Wall</span>
        </div>
    </div>
    <nav>
        <a href="index.html">Map</a>
        <a class="active" href="grid.html">Grid</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<main>
    <div class="toolbar">
        <div class="status-pill"><span>Total Cameras</span><strong id="camCount">0</strong></div>
        <div class="status-pill"><span>Layout</span><strong id="gridMeta">-</strong></div>
    </div>
    <div id="grid" aria-live="polite"></div>
</main>

<script src="cctv-grid.js"></script>
</body>
</html>
