<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID</title>
    <link rel="stylesheet" href="cctv-theme.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .wall-card {
            padding: 18px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 13px;
            border-radius: 999px;
            background: rgba(255, 250, 244, 0.82);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 13px;
        }

        .status-pill strong {
            color: var(--ink);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        #grid {
            min-height: 0;
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(var(--grid-cols), minmax(0, 1fr));
            grid-template-rows: repeat(var(--grid-rows), minmax(0, 1fr));
        }

        .tile {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 84% 18%, rgba(255, 205, 118, 0.1), transparent 20%),
                rgba(251, 246, 239, 0.92);
            border: 1px solid rgba(80, 57, 42, 0.1);
            border-radius: 26px;
            box-shadow: var(--shadow-soft);
        }

        .tile-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 250, 244, 0.76);
        }

        .tile-title {
            min-width: 0;
        }

        .tile-title strong {
            display: block;
            font-family: 'Sora', 'IBM Plex Sans', sans-serif;
            font-size: 14px;
            color: var(--ink-strong);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tile-title span {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tile-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 9px;
            border-radius: 999px;
            border: 1px solid rgba(80, 57, 42, 0.12);
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .tile-media {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            background: #1a1410;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile-media video-stream {
            width: 100%;
            height: 100%;
        }

        .tile-media .placeholder {
            color: rgba(255, 245, 236, 0.7);
            font-size: 13px;
        }

        .grid-empty {
            grid-column: 1 / -1;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            border: 1px dashed rgba(80, 57, 42, 0.18);
            background: rgba(255, 250, 244, 0.7);
            color: var(--muted);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) {
            .wall-card {
                padding: 16px;
            }

            .toolbar {
                flex-direction: column;
                align-items: flex-start;
            }

            #grid {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<script type="module" src="./video-stream.js"></script>
<script src="map-theme.js"></script>

<header class="site-header">
    <div class="site-brand">
        <img id="corpLogo" alt="CCTV brand logo">
        <div>
            <div class="site-mark" id="corpName">GRID</div>
        </div>
    </div>
    <nav aria-label="Primary">
        <a href="index.html">Map</a>
        <a class="active" href="grid.html">Grid</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<main>
    <section class="surface wall-card">
        <div class="toolbar">
            <div class="status-pill"><span>Layout</span><strong id="gridMeta">-</strong></div>
            <div class="status-pill"><span>Cameras</span><strong id="camCount">0</strong></div>
        </div>
        <div id="grid" aria-live="polite"></div>
    </section>
</main>

<script src="cctv-grid.js"></script>
</body>
</html>
