<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>stream - go2rtc</title>
    <link rel="stylesheet" href="cctv-theme.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1 1 auto;
            min-height: 0;
        }

        .player-card {
            flex: 1 1 auto;
            min-height: 0;
        }

        .stream-rack {
            min-height: 0;
        }

        .stream-rack video-stream {
            min-height: 240px;
            border-radius: 20px;
            overflow: hidden;
            background: #1a1410;
        }
    </style>
</head>
<body>
<script src="main.js"></script>
<script type="module" src="./video-stream.js"></script>
<main class="player-shell">
    <section class="card player-card">
        <div id="rack" class="stream-rack"></div>
    </section>
</main>
<script type="module">
    const params = new URLSearchParams(location.search);

    const streams = params.getAll('src');
    const modes = params.getAll('mode');
    if (modes.length === 0) modes.push('');

    while (modes.length > streams.length) {
        streams.push(streams[0]);
    }
    while (streams.length > modes.length) {
        modes.push(modes[0]);
    }

    const background = params.get('background') !== 'false';
    const width = '1 0 ' + (params.get('width') || '320px');
    const rack = document.getElementById('rack');

    if (streams.length > 1) {
        rack.classList.add('multi');
    }

    for (let i = 0; i < streams.length; i++) {
        /** @type {VideoStream} */
        const video = document.createElement('video-stream');
        video.background = background;
        video.mode = modes[i] || video.mode;
        video.style.flex = width;
        video.src = new URL('api/ws?src=' + encodeURIComponent(streams[i]), location.href);
        rack.appendChild(video);
    }

    document.title = streams.join('/') + ' - go2rtc';
</script>
</body>
</html>
