<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <style>
        :root {
            --header-height: 64px;
            --bg: #0b0d10;
            --fg: #f7f3ea;
            --muted: #a6a19a;
            --card: rgba(20, 24, 32, 0.88);
            --border: rgba(255, 255, 255, 0.08);
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 15% 15%, #1b2230, var(--bg));
            color: var(--fg);
        }

        header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(120deg, #111823, #0c1016 55%, #0b0d10);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand img {
            height: 34px;
            width: auto;
            display: none;
            border-radius: 8px;
        }

        .brand-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-title strong {
            font-size: 18px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .brand-title span {
            font-family: "Space Mono", monospace;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--fg);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border: 1px solid transparent;
            padding: 6px 10px;
            border-radius: 999px;
            transition: all 0.2s ease;
        }

        nav a:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        nav a.active {
            background: rgba(255, 191, 95, 0.16);
            border-color: rgba(255, 191, 95, 0.4);
            color: #ffdb9a;
        }

        #map {
            height: calc(100% - var(--header-height));
        }

        #viewer {
            position: fixed;
            top: calc(var(--header-height) + 10px);
            right: 10px;
            bottom: 10px;
            width: min(560px, calc(100% - 20px));
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
        }

        #viewerHeader {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid var(--border);
        }

        #viewerTitle {
            font-weight: 650;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #viewerHeader button {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--fg);
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
        }

        #viewerBody {
            height: calc(100% - 44px);
            background: black;
        }

        .hint {
            padding: 12px;
            color: var(--muted);
            font-size: 14px;
        }

        .leaflet-popup-content {
            margin: 10px 12px;
        }

        .popup-title {
            font-weight: 650;
            margin-bottom: 4px;
        }

        .popup-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .popup-player {
            margin-top: 10px;
            width: min(360px, 72vw);
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .popup-player video-stream {
            display: block;
            width: 100%;
            height: 100%;
        }

        .btn {
            border: 1px solid #2b2f3a;
            background: #151923;
            color: var(--fg);
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn:hover {
            filter: brightness(1.08);
        }

        @media (max-width: 900px) {
            header {
                height: auto;
                padding: 12px 14px;
                gap: 10px;
                flex-direction: column;
                align-items: flex-start;
            }

            nav {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<script type="module" src="./video-stream.js"></script>

<header>
    <div class="brand">
        <img id="corpLogo" alt="logo">
        <div class="brand-title">
            <strong id="corpName">CCTV Map</strong>
            <span id="corpTag">Live Map</span>
        </div>
    </div>
    <nav>
        <a class="active" href="index.html">Map</a>
        <a href="grid.html">Grid</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<div id="map"></div>

<div id="viewer" role="dialog" aria-modal="true">
    <div id="viewerHeader">
        <div id="viewerTitle">Camera</div>
        <button id="viewerClose" type="button">Close</button>
    </div>
    <div id="viewerBody"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="cctv-map.js"></script>

</body>
</html>
