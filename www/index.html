<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Map</title>
    <link rel="stylesheet" href="cctv-theme.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
        }

        .hero-card {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            gap: 0;
            padding: 12px 12px 14px;
            min-height: 0;
        }

        .hero-media {
            display: flex;
            flex-direction: column;
            gap: 0;
            flex: 1 1 auto;
            min-height: 0;
        }

        .hero-map-shell {
            position: relative;
            flex: 1 1 auto;
            min-height: clamp(560px, 72vh, 980px);
            overflow: hidden;
            border-radius: 30px;
            background:
                radial-gradient(circle at 84% 18%, rgba(255, 205, 118, 0.16), transparent 18%),
                linear-gradient(180deg, #f9f4ed 0%, #eadfce 100%);
            border: 1px solid rgba(80, 57, 42, 0.1);
        }

        #map {
            position: absolute;
            inset: 0;
        }

        .leaflet-popup-content {
            margin: 10px 12px;
        }

        .popup-title {
            font-weight: 700;
            color: var(--ink-strong);
            margin-bottom: 6px;
        }

        .popup-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .popup-player {
            margin-top: 10px;
            width: min(560px, 84vw);
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .popup-player video-stream {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hint {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        #viewer {
            position: fixed;
            top: 118px;
            right: 18px;
            bottom: 18px;
            width: min(560px, calc(100% - 36px));
            display: none;
            overflow: hidden;
            border-radius: 30px;
            background: rgba(248, 240, 230, 0.94);
            border: 1px solid rgba(80, 57, 42, 0.12);
            box-shadow: var(--shadow);
            z-index: 30;
            backdrop-filter: blur(12px);
        }

        #viewerHeader {
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 250, 244, 0.84);
        }

        #viewerTitle {
            font-family: 'Sora', 'IBM Plex Sans', sans-serif;
            font-size: 15px;
            letter-spacing: -0.02em;
            font-weight: 700;
            color: var(--ink-strong);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #viewerHeader button {
            min-height: 38px;
            padding: 8px 14px;
        }

        #viewerBody {
            height: calc(100% - 54px);
            background: #1a1410;
        }

        @media (max-width: 1024px) {
            .hero-map-shell {
                min-height: 460px;
            }
        }

        @media (max-width: 900px) {
            main {
                padding-bottom: 8px;
            }

            .hero-card {
                padding: 10px;
            }

            .hero-map-shell {
                min-height: 400px;
            }

            #viewer {
                left: 12px;
                right: 12px;
                top: 112px;
                width: auto;
            }
        }
    </style>
</head>
<body>
<script type="module" src="./video-stream.js"></script>
<script src="map-theme.js"></script>

<header class="site-header">
    <div class="site-brand">
        <img id="corpLogo" alt="CCTV brand logo">
        <div>
            <div class="site-mark" id="corpName">CCTV Map</div>
        </div>
    </div>
    <nav aria-label="Primary">
        <a class="active" href="index.html">Map</a>
        <a href="grid.html">Grid</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<main>
    <section class="hero-card">
        <div class="hero-media">
            <div class="hero-map-shell frame-surface">
                <div id="map"></div>
            </div>
        </div>
    </section>
</main>

<div id="viewer" role="dialog" aria-modal="true" aria-labelledby="viewerTitle">
    <div id="viewerHeader">
        <div id="viewerTitle">Camera</div>
        <button id="viewerClose" type="button">Close</button>
    </div>
    <div id="viewerBody"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="cctv-map.js"></script>

</body>
</html>
