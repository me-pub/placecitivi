<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <style>
        :root {
            --header-height: 48px;
            --bg: #0b0c10;
            --fg: #f4f5f7;
            --muted: #aeb3bd;
            --card: rgba(20, 22, 28, 0.92);
            --border: rgba(255, 255, 255, 0.08);
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
        }

        header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            border-bottom: 1px solid var(--border);
            background: #0f1117;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .brand img {
            height: 28px;
            width: auto;
            display: none;
        }

        .brand .name {
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        nav a {
            color: var(--fg);
            text-decoration: none;
            opacity: 0.92;
            margin-left: 10px;
            font-size: 14px;
        }

        nav a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        #map {
            height: calc(100% - var(--header-height));
        }

        #viewer {
            position: fixed;
            top: calc(var(--header-height) + 10px);
            right: 10px;
            bottom: 10px;
            width: min(560px, calc(100% - 20px));
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
        }

        #viewerHeader {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid var(--border);
        }

        #viewerTitle {
            font-weight: 650;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #viewerHeader button {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--fg);
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
        }

        #viewerBody {
            height: calc(100% - 44px);
            background: black;
        }

        .hint {
            padding: 12px;
            color: var(--muted);
            font-size: 14px;
        }

        .leaflet-popup-content {
            margin: 10px 12px;
        }

        .popup-title {
            font-weight: 650;
            margin-bottom: 4px;
        }

        .popup-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .popup-player {
            margin-top: 10px;
            width: min(360px, 72vw);
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .popup-player video-stream {
            display: block;
            width: 100%;
            height: 100%;
        }

        .btn {
            border: 1px solid #2b2f3a;
            background: #151923;
            color: var(--fg);
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn:hover {
            filter: brightness(1.08);
        }
    </style>
</head>
<body>
<script type="module" src="./video-stream.js"></script>

<header>
    <div class="brand">
        <img id="corpLogo" alt="logo">
        <div class="name" id="corpName">CCTV Map</div>
    </div>
    <nav>
        <a href="admin.html">Admin</a>
        <a href="streams.html">Streams</a>
    </nav>
</header>

<div id="map"></div>

<div id="viewer" role="dialog" aria-modal="true">
    <div id="viewerHeader">
        <div id="viewerTitle">Camera</div>
        <button id="viewerClose" type="button">Close</button>
    </div>
    <div id="viewerBody"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="cctv-map.js"></script>

</body>
</html>
